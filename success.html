<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTRC Network Access - Success</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>✅ Payment Successful!</h2>
        <p id="success-time"></p>
        <a href="javascript:startSession()" class="btn btn-primary btn-large">Start Session</a>
        <a href="dashboard.html" class="btn btn-secondary">Go to Dashboard</a>
        <a href="welcome.html" class="btn btn-back">Home</a>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const plan = localStorage.getItem('currentPlan') || 'No plan';
            const phone = localStorage.getItem('phone') || '';
            const durationText = plan === '1h' ? '1 Hour' : plan === '3h' ? '3 Hours' : '1 Day';
            document.getElementById('success-time').innerHTML = 
                `<strong>Welcome ${phone}!</strong><br>You now have ${durationText} access.`;
        });
        
        function startSession() {
            const plan = localStorage.getItem('currentPlan');
            let duration = 3600; // 1h default
            if (plan === '3h') duration = 10800;
            else if (plan === '1d') duration = 86400;
            
            localStorage.setItem('sessionStart', Date.now());
            localStorage.setItem('totalDuration', duration);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
