<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTRC Network Access - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>My Session</h2>
        <div class="status-card">
            <p><strong>Status:</strong> <span id="session-status"></span></p>
            <p><strong>Remaining Time:</strong> <span id="remaining-time">Loading...</span></p>
            <p><strong>Plan:</strong> <span id="dashboard-plan"></span></p>
            <p><strong>Phone:</strong> <span id="user-phone"></span></p>
            <div id="warning" class="warning hidden">⚠️ Time running low!</div>
        </div>
        <button onclick="refreshStatus()" class="btn btn-primary">Refresh</button>
        <a href="welcome.html" class="btn btn-secondary" onclick="logout()">Logout</a>
    </div>
    
    <script>
        let timerInterval;
        
        document.addEventListener('DOMContentLoaded', () => {
            updateDashboard();
            startTimer();
        });
        
        function updateDashboard() {
            const phone = localStorage.getItem('phone') || 'Not set';
            const plan = localStorage.getItem('currentPlan') || 'None';
            document.getElementById('dashboard-plan').textContent = plan.toUpperCase();
            document.getElementById('user-phone').textContent = phone;
            updateTimer();
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function updateTimer() {
            const startTime = parseInt(localStorage.getItem('sessionStart') || 0);
            const duration = parseInt(localStorage.getItem('totalDuration') || 0);
            
            if (!startTime || !duration) {
                document.getElementById('session-status').textContent = 'No Active Session';
                document.getElementById('remaining-time').textContent = '00:00:00';
                return;
            }
            
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            let remaining = Math.max(0, duration - elapsed);
            
            const statusEl = document.getElementById('session-status');
            const timeEl = document.getElementById('remaining-time');
            const warningEl = document.getElementById('warning');
            
            if (remaining <= 0) {
                statusEl.textContent = 'Expired';
                statusEl.className = 'status-expired';
                timeEl.textContent = '00:00:00';
                warningEl.classList.add('hidden');
                if (timerInterval) clearInterval(timerInterval);
            } else {
                statusEl.textContent = 'Active';
                statusEl.className = 'status-active';
                timeEl.textContent = formatTime(remaining);
                
                // Warning
                if (remaining <= 300) {
                    warningEl.classList.remove('hidden');
                    if (remaining <= 60) warningEl.textContent = '⏰ Session ending soon!';
                } else {
                    warningEl.classList.add('hidden');
                }
            }
        }
        
        function refreshStatus() {
            updateDashboard();
        }
        
        function logout() {
            if (confirm('Logout and clear session?')) {
                localStorage.clear();
                if (timerInterval) clearInterval(timerInterval);
            }
        }
        
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
    </script>
</body>
</html>
