<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTRC Network Access - Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Admin Dashboard</h2>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Phone</th>
                    <th>Plan</th>
                    <th>Time Left</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="admin-users">
            </tbody>
        </table>
        <a href="welcome.html" class="btn btn-back">Home</a>
    </div>
    
    <script>
        const adminUsers = [
            { phone: '+237 692 123 456', plan: '1h', timeLeft: '45:23', status: 'active' },
            { phone: '+237 699 789 012', plan: '3h', timeLeft: '02:15:47', status: 'active' },
            { phone: '+237 654 321 987', plan: '1d', timeLeft: '18:42:11', status: 'active' },
            { phone: '+237 678 901 234', plan: '1h', timeLeft: '00:00:00', status: 'expired' }
        ];
        
        document.addEventListener('DOMContentLoaded', () => {
            renderAdminTable();
        });
        
        function renderAdminTable() {
            const tbody = document.getElementById('admin-users');
            tbody.innerHTML = '';
            
            adminUsers.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.phone}</td>
                    <td>${user.plan.toUpperCase()}</td>
                    <td>${user.timeLeft}</td>
                    <td class="${user.status === 'active' ? 'status-active' : 'status-expired'}">${user.status.toUpperCase()}</td>
                `;
                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
